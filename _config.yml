# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 我的个人博客
subtitle: '记录学习与生活'
description: '这是一个基于 Hexo 构建的个人博客，分享技术文章、项目经验和生活感悟。'
keywords: 博客, 技术, 前端, 后端, 项目
author: 你的姓名
language: zh-CN
timezone: Asia/Shanghai

# URL
## 部署到 GitHub Pages 时请替换为你的用户名和仓库名
url: https://puupyboy.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: landscape

# Deployment
deploy:
  type: git
  repo: https://github.com/yourusername/yourusername.github.io.git
  branch: main

# 自定义导航菜单（在主题配置中生效）
menu:
  首页: /
  关于我: /about/
  项目: /projects/
  博客: /archives/
  联系我: /contact/
